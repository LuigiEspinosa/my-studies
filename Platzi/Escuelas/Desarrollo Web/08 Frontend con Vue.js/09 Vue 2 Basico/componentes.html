<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World!</title>
</head>

<body>
  <div id="app">
    <h1>{{ title }}</h1>
    <counter></counter>
  </div>

  <!-- development version, includes helpful console warnings -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

  <script>
    Vue.component('counter', {
      data() {
        return {
          counter: 0
        }
      },

      methods: {
        increment() {
          this.counter += 1
        }
      },

      template: `
        <div>
          <button v-on:click="increment">Click Me!</button><br />
          <span>{{ counter }}</span>
        </div>
      `
    })

    new Vue({
      el: '#app',

      data() {
        return {
          title: 'Hola Vue!'
        }
      }
    })
  </script>
</body>

</html>
