<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forms & Inputs</title>
</head>

<body>
  <form action="process.php">
    <div>
      <label for="name">Name</label>
      <input type="text" name="name" id="name" value="John Doe">
    </div>
    <div>
      <label for="email">Email</label>
      <input type="email" name="email" id="email" placeholder="example@emal.com">
    </div>
    <div>
      <label for="message">Message</label>
      <textarea name="message" id="message" cols="50" rows="5"></textarea>
    </div>
    <div>
      <label for="sex">Sex</label>
      <select name="sex" id="sex">
        <option value="male" selected>Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div>
      <label for="age">Age</label>
      <input type="number" name="age" id="age">
    </div>
    <div>
      <label for="birthdate">Birthdate</label>
      <input type="date" name="birthdate" id="birthdate">
    </div>
    <div>
      <label for="membership">Membership</label>
      <input type="radio" name="membership" id="membership" value="simple" checked> Simple
      <input type="radio" name="membership" id="membership" value="standard"> Standard
      <input type="radio" name="membership" id="membership" value="premium"> Premium
    </div>
    <div>
      <label for="hobbies">Hobbies</label>
      <input type="checkbox" name="hobbies" id="hobbies" value="videogames" checked> Videogames
      <input type="checkbox" name="hobbies" id="hobbies" value="movies"> Movies
      <input type="checkbox" name="hobbies" id="hobbies" value="music"> Music
    </div>

    <input type="submit" value="Submit">
    <!-- <button type="submit">Submit</button> -->
    <button type="reset">Reset</button>
  </form>
</body>

</html>
